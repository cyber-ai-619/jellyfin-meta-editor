<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jellyfin Media Manager</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Jellyfin Media Manager</h1>
            <div id="server-info">Not connected</div>
        </header>
        <div class="controls">
            <div class="tab-controls">
                <button class="tab active" data-tab="movies">Library</button>
                <a href="people.html" class="tab">People</a>
            </div>
            <div class="view-controls">
                <button class="view-btn active" data-view="grid">
                    <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4zm6-10v4h4v-4h-4z"/></svg>
                </button>
                <button class="view-btn" data-view="square">
                    <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z"/></svg>
                </button>
                <button class="view-btn" data-view="list">
                    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h18v-2H3v2zm0 4h18v-2H3v2zm0 4h18v-2H3v2z"/></svg>
                </button>
            </div>
            <div class="filter-controls">
                <input type="text" id="search-input" placeholder="Search...">
                <select id="library-select"></select>
                <select id="content-type-select">
                    <option value="all">All</option>
                    <option value="movie">Movies</option>
                    <option value="series">Series</option>
                    <option value="music">Music</option>
                    <option value="photo">Photos</option>
                </select>
            </div>
            <div class="selection-controls" id="bulk-actions" style="display: none;">
                <span id="selected-count">0 items selected</span>
                <input type="checkbox" id="select-all">
                <button id="clear-selection">Clear</button>
                <button id="bulk-edit-btn">Bulk Edit</button>
            </div>
        </div>
        <div id="media-container"></div>

        <!-- Edit Modal -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <span id="close-modal">&times;</span>
                <h2>Edit Media</h2>
                <div id="modal-alert"></div>
                <form id="edit-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title:</label>
                            <input type="text" id="edit-title">
                        </div>
                        <div class="form-group">
                            <label>Year:</label>
                            <input type="number" id="edit-year" min="1900" max="2099">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Overview:</label>
                        <textarea id="edit-overview"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Rating:</label>
                            <input type="number" id="edit-rating" min="0" max="10" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Director:</label>
                            <input type="text" id="edit-director" placeholder="Director name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Actors:</label>
                        <input type="text" id="edit-actors" placeholder="Comma separated list of actors">
                    </div>

                    <div class="form-group">
                        <label>Genres:</label>
                        <div class="tags-container" id="genres-container">
                            <input type="text" id="genre-input" placeholder="Add genre...">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tags:</label>
                        <div class="tags-container" id="tags-container">
                            <input type="text" id="tag-input" placeholder="Add tag...">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="save-metadata" class="primary">Save Changes</button>
                        <button type="button" id="cancel-edit" class="secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bulk Edit Modal -->
        <div id="bulk-modal" class="modal">
    <div class="modal-content">
        <h2>Bulk Edit <span id="bulk-item-count">0</span> items<span id="close-bulk-modal">&times;</span></h2>
        <div id="bulk-alert"></div>
        <form id="bulk-form">
            <div class="form-group">
                <label>Add Genres</label>
                <div class="tags-container" id="bulk-genres-container">
                    <input type="text" id="bulk-genre-input" placeholder="Add genre...">
                </div>
            </div>
            <div class="form-group">
                <label>Add Tags</label>
                <div class="tags-container" id="bulk-tags-container">
                    <input type="text" id="bulk-tag-input" placeholder="Add tag...">
                </div>
            </div>
            <div class="form-group">
                <label>Remove Tags</label>
                <div class="tags-container" id="bulk-remove-tags-container">
                    <input type="text" id="bulk-remove-tag-input" placeholder="Remove tag...">
                </div>
            </div>

            <!-- Bulk progress bar -->
            <div class="progress-wrapper" id="bulk-progress-wrapper" style="display:none;">
                <div class="progress" id="bulk-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div class="progress-bar" id="bulk-progress-bar" style="width:0%"></div>
                </div>
                <div class="progress-text" id="bulk-progress-text">0 / 0</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bulk-rating">Rating</label>
                    <input type="number" id="bulk-rating" min="0" max="10" step="0.1">
                </div>
                <div class="form-group">
                    <label for="bulk-director">Director</label>
                    <input type="text" id="bulk-director">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="bulk-studio">Studio</label>
                    <input type="text" id="bulk-studio">
                </div>
                <div class="form-group">
                    <label for="bulk-actor">Actor</label>
                    <input type="text" id="bulk-actor">
                </div>
            </div>
            <div class="form-actions">
                <button type="button" id="apply-bulk" class="primary">Apply Changes</button>
                <button type="button" id="cancel-bulk" class="secondary">Cancel</button>
            </div>
        </form>
    </div>
</div>

        <!-- Add Actor Modal -->
        <div id="add-actor-modal" class="modal">
            <div class="modal-content">
                <span id="close-add-actor-modal">&times;</span>
                <h2>Add Actor</h2>
                <div id="add-actor-alert"></div>
                <input type="text" id="search-person-input" placeholder="Search for a person...">
                <div id="search-results"></div>
                <button id="create-new-person">Create New Person</button>
                <button id="cancel-add-actor">Cancel</button>
            </div>
        </div>

        
        <!-- Edit Person Modal -->
<div id="edit-person-modal" class="modal">
    <div class="modal-content">
        <h2>Edit Person<span id="close-person-modal">&times;</span></h2>
        <div id="person-modal-alert"></div>
        <form id="person-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="person-name">Name *</label>
                    <input type="text" id="person-name" required>
                </div>
                <div class="form-group">
                    <label for="person-role">Primary Role</label>
                    <select id="person-role">
                        <option value="Actor">Actor</option>
                        <option value="Director">Director</option>
                        <option value="Writer">Writer</option>
                        <option value="Producer">Producer</option>
                        <option value="Composer">Composer</option>
                        <option value="Cinematographer">Cinematographer</option>
                        <option value="Editor">Editor</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="person-birth-date">Birth Date</label>
                    <input type="date" id="person-birth-date">
                </div>
                <div class="form-group">
                    <label for="person-death-date">Death Date</label>
                    <input type="date" id="person-death-date">
                </div>
            </div>
            <div class="form-group">
                <label for="person-biography">Biography</label>
                <textarea id="person-biography" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Photo</label>
                <div class="file-input-wrapper">
                    <div class="file-input-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                        Upload Photo
                    </div>
                    <input type="file" id="person-photo" accept="image/*">
                </div>
                <div id="person-photo-preview">
                    <div class="photo-preview empty">No photo selected</div>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" id="save-person" class="primary">Save Person</button>
                <button type="button" id="cancel-person" class="secondary">Cancel</button>
            </div>
        </form>
    </div>
</div>
    </div>
    <script src="script.js"></script>
    <script src="media.js"></script>
</body>
</html>
